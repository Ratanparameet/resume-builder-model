<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Match · Resume Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="tab">RESUME → ROLE</div>
      <h1>Find the role your resume actually fits</h1>
      <p>Fill in what you'd put on a resume. The model reads it the way a recruiter would skim it.</p>
    </div>
  </header>

  <main class="wrap">

    <section class="card form-card">
      <form id="resume-form">

        <div class="field">
          <label for="education">Education</label>
          <input type="text" id="education" name="education" placeholder="e.g. B.TECH">
        </div>

        <div class="field">
          <label for="experience">Experience</label>
          <input type="text" id="experience" name="experience" placeholder="e.g. Fresher, 6 Months, 2 Years">
        </div>

        <div class="field">
          <label for="projects">Projects</label>
          <textarea id="projects" name="projects" rows="3" placeholder="e.g. Rice Recommendation (Random Forest), Car Sales Dashboard (Power BI)"></textarea>
        </div>

        <div class="field">
          <label for="skills">Skills</label>
          <textarea id="skills" name="skills" rows="3" placeholder="e.g. Python, SQL, Power BI, Excel"></textarea>
        </div>

        <div class="field">
          <label for="certificates">Certificates</label>
          <textarea id="certificates" name="certificates" rows="2" placeholder="e.g. Data Science & AI (IT Vedant)"></textarea>
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary" id="submit-btn">Find my role</button>
          <span class="hint" id="form-hint"></span>
        </div>
      </form>
    </section>

    <section class="result-section" id="result-section" hidden>
      <div class="index-card" id="index-card">
        <div class="index-card-tab">MATCH</div>
        <p class="result-label">Best-fit role</p>
        <h2 class="result-role" id="result-role">—</h2>
        <p class="result-confidence" id="result-confidence"></p>

        <div class="rank-list" id="rank-list"></div>
      </div>
    </section>

    <p class="status-line" id="status-line"></p>

  </main>

  <footer class="site-footer">
    <span id="footer-status">checking backend…</span>
  </footer>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
